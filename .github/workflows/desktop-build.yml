name: Desktop build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - label: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - label: macOS
            os: macos-latest
            rust-target: universal-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    env:
      TAURI_BUILD: "1"
      NEXT_PUBLIC_TAURI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: thinking-minds-erp-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
