name: Desktop build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
          - label: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - label: macOS
            os: macos-latest
            rust-target: universal-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    env:
      TAURI_BUILD: "1"
      NEXT_PUBLIC_TAURI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: thinking-minds-erp-${{ matrix.label }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*
            src-tauri/target/release/bundle/**/*

  publish-release:
    name: Publish GitHub Release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Publish release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          TITLE="Thinking Minds ERP ${VERSION}"

          if ! gh release view "$VERSION" >/dev/null 2>&1; then
            gh release create "$VERSION" \
              --title "$TITLE" \
              --notes "Desktop installers for Linux, Windows, and macOS." \
              --latest
          fi

          mapfile -t files < <(find installers -type f \( -iname '*.deb' -o -iname '*.appimage' -o -iname '*.exe' -o -iname '*.dmg' \))
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer files found to upload."
            exit 1
          fi

          gh release upload "$VERSION" "${files[@]}" --clobber
