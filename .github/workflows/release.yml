name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release tag (e.g. v5.0.0)
        required: true
        default: v5.0.0

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Release (${{ matrix.label }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: --target x86_64-unknown-linux-gnu
          - label: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
          - label: macOS
            os: macos-latest
            rust-target: universal-apple-darwin
            tauri-args: --target universal-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    env:
      TAURI_BUILD: "1"
      NEXT_PUBLIC_TAURI: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseName: Thinking Minds ERP ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          releaseBody: |
            Desktop installers for **Thinking Minds ERP**.

            | Platform | Artifact |
            | --- | --- |
            | Linux | `.deb` and `.AppImage` |
            | Windows | `.exe` (NSIS installer) |
            | macOS | `.dmg` |
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
